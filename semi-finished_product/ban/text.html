<meta charset="utf-8">
<script src="https://cdn.staticfile.org/jquery/2.2.4/jquery.min.js"></script>
<script src="base64.js"></script>
<script>
    function isban( str )
    {
        $.get( "./ban.txt", function ( data, status )
        {
            var banWords = data.split( "\n" );
            console.log( banWords );

            for ( var i = 0; i < banWords.length; ++i )
            {
                var temp = Base64.decode( banWords[ i ] );
                var banStatus = str.indexOf( temp.slice( 0, temp.length - 1 ) );
                if ( banStatus >= 0 )
                {
                    console.log( "非法字符，位于第" + banStatus.toString() + "个字符中" );
                }
            }
        } );
    }
</script>
