<!-- 把参数“text”的内容原原本本展示出来 -->
<div id="_in"></div>
<script>
    function getQueryVariable(variable) {
		var query = window.location.search.substring(1);
		var vars = query.split("&");
		for (var i = 0; i < vars.length; i++) {
			var pair = vars[i].split("=");
			if (pair[0] == variable) {
				return pair[1];
			}
		}
		return (false);
	}
	var index = document.getElementById("_in");
	var p = document.createElement("div");
	p.innerHTML = decodeURIComponent(getQueryVariable("text"));
	index.appendChild(p);
</script>
